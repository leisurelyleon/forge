# Rename `app` to your own unique Fly app name after `fly launch`.
app = "forge-server"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Keep the machine always-on so the live analyzer never cold-starts.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
